syntax = "proto3";

option go_package = "server/pkg/network/protocol;protocol";

message Packet {
  uint32 id = 1;
  oneof payload {
    ErrorRes error_res = 2;
    LoginReq login_req = 3;
    LoginRes login_res = 4;
    RegisterReq register_req = 5;
    RegisterRes register_res = 6;
    MyCharactersListReq my_characters_list_req = 7;
    MyCharactersListRes my_characters_list_res = 8;
    CharacterJoinReq character_join_req = 9;
    CharacterJoinRes character_join_res = 10;
    CastSpellReq cast_spell_req = 11;
    CastSpellRes cast_spell_res = 12;
  }
}

message ErrorRes {
    string msg = 1;
}

message LoginReq {
  string username = 1;
  string password = 2;
}
message LoginRes {};

message RegisterReq {
  string username = 1;
  string password = 2;
}
message RegisterRes{}

message MyCharactersListReq {}
message MyCharacter {
    uint32 id = 1;
    string nickname = 2;
    uint32 level = 3;
}
message MyCharactersListRes {
    repeated MyCharacter characters = 1;
}

message CharacterJoinReq {
    uint32 id = 1;
}
message CharacterJoinRes {}

message CastSpellReq {
    uint32 spell_id = 1;
    uint32 target_id = 2;
}
message CastSpellRes {}
